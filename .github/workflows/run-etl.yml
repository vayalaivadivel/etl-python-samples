name: Run PySpark ETL

on:
  workflow_dispatch:

jobs:
  emr-etl:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      EMR_APP_ID: ${{ secrets.EMR_APP_ID }}
      EMR_EXEC_ROLE_ARN: ${{ secrets.EMR_EXEC_ROLE_ARN }}
      TEMP_S3_BUCKET: ${{ secrets.TEMP_S3_BUCKET }}
      JOB_PREFIX: etl-run-${{ github.run_id }}

    steps:

    # 1️⃣ Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3️⃣ Upload ETL script and config to S3
    - name: Upload ETL files
      run: |
        aws s3 cp emr-etl-project/etl/src/load_s3_to_rds.py s3://$TEMP_S3_BUCKET/$JOB_PREFIX/
        aws s3 cp emr-etl-project/etl/conf/config.yaml s3://$TEMP_S3_BUCKET/$JOB_PREFIX/

    - name: Ensure EMR Serverless is running
      run: |
        STATUS=$(aws emr-serverless get-application \
          --application-id $EMR_APP_ID \
          --query 'application.state' \
          --output text)

        echo "Current EMR state: $STATUS"

        if [[ "$STATUS" == "TERMINATED" ]]; then
          echo "Reactivating application..."

          aws emr-serverless update-application \
            --application-id $EMR_APP_ID
        fi

        STATUS=$(aws emr-serverless get-application \
          --application-id $EMR_APP_ID \
          --query 'application.state' \
          --output text)

        if [[ "$STATUS" == "CREATED" || "$STATUS" == "STOPPED" ]]; then
          echo "Starting application..."

          aws emr-serverless start-application \
            --application-id $EMR_APP_ID
        fi

        echo "Waiting for EMR to start..."

        for i in {1..30}; do
          STATUS=$(aws emr-serverless get-application \
            --application-id $EMR_APP_ID \
            --query 'application.state' \
            --output text)

          echo "Current state: $STATUS"

          if [[ "$STATUS" == "STARTED" ]]; then
            echo "Application is ready"
            break
          fi

          sleep 10
        done
        

    # 5️⃣ Submit Spark job
    - name: Submit ETL Job
      run: |
        JOB_RUN_ID=$(aws emr-serverless start-job-run \
          --application-id $EMR_APP_ID \
          --execution-role-arn $EMR_EXEC_ROLE_ARN \
          --job-driver '{
            "sparkSubmit": {
              "entryPoint": "s3://'"$TEMP_S3_BUCKET"'/'"$JOB_PREFIX"'/load_s3_to_rds.py",
              "entryPointArguments": [
                "--config",
                "config.yaml"
              ],
              "sparkSubmitParameters": "--files s3://'"$TEMP_S3_BUCKET"'/'"$JOB_PREFIX"'/config.yaml"
            }
          }' \
          --query 'jobRunId' \
          --output text)

        echo "JOB_RUN_ID=$JOB_RUN_ID" >> $GITHUB_ENV
        echo "Started Job: $JOB_RUN_ID"

    # 6️⃣ Wait for job completion
    - name: Wait for job completion
      run: |
        while true; do
          STATUS=$(aws emr-serverless get-job-run \
            --application-id $EMR_APP_ID \
            --job-run-id $JOB_RUN_ID \
            --query 'jobRun.state' \
            --output text)

          echo "Job status: $STATUS"

          if [[ "$STATUS" == "SUCCESS" || "$STATUS" == "FAILED" || "$STATUS" == "CANCELLED" ]]; then
            break
          fi

          sleep 15
        done

        if [[ "$STATUS" != "SUCCESS" ]]; then
          echo "Job failed"
          exit 1
        fi

    # 7️⃣ Cleanup temporary S3 files
    - name: Cleanup
      run: |
        aws s3 rm s3://$TEMP_S3_BUCKET/$JOB_PREFIX/ --recursive